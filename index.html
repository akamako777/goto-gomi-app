   // --- 🏆 最終完成版：セット回収対応・安全装置付き ---
function getGarbage(date, rKey) {
    // 1. 基本チェック
    if(!rKey || !SCHEDULES[rKey]) return TYPES.none;

    const m = date.getMonth() + 1;
    const d = date.getDate();
    const day = date.getDay(); 
    const week = getWeekNum(date);

    // 2. 年末年始 (12/31 ～ 1/4)
    if (m === 12 && d >= 31) return TYPES.none;
    if (m === 1 && d <= 4)   return TYPES.none;

    // 3. 特殊な全回収日の判定 (黄島・赤島・半泊)
    if (SCHEDULES[rKey].isSeasonal) {
        const isSummer = (m >= 7 && m <= 9);
        if (isSummer && (day === 1 || day === 4)) {
            return { ...TYPES.burnable, id: 'all', label: { ja:'全種類回収', en:'All Types'}, color: 'bg-brand', icon: 'fa-star' };
        } else if (!isSummer && day === 1) {
            return { ...TYPES.burnable, id: 'all', label: { ja:'全種類回収', en:'All Types'}, color: 'bg-brand', icon: 'fa-star' };
        }
    }
    if (rKey === 'handomari' && day === 1) {
        return { ...TYPES.burnable, id: 'all', label: { ja:'全種類回収', en:'All Types'}, color: 'bg-brand', icon: 'fa-star' };
    }

    // 4. 通常スケジュールの判定
    const rules = SCHEDULES[rKey].rules;
    
    // ★【ここがエアバッグ！】rulesが無い地域でもクラッシュさせない
    if (!rules || !Array.isArray(rules)) return TYPES.none; 
    
    const matches = rules.filter(r => {
        if(!r.days.includes(day)) return false;
        if(r.weekNums && !r.weekNums.includes(week)) return false;
        return true;
    });

    if (matches.length === 0) return TYPES.none;

    // 1つだけならそのまま返す
    if (matches.length === 1) return TYPES[matches[0].type];

    // 5. セット回収 (2つ以上) の合体処理
    // ★【ここもエアバッグ！】万が一データ欠損があっても表示を止めない
    const combinedLabel = {
        ja: matches.map(m => TYPES[m.type]?.label?.ja || '').join('・'),
        en: matches.map(m => TYPES[m.type]?.label?.en || '').join(' / '),
        es: matches.map(m => TYPES[m.type]?.label?.es || '').join(' / '),
        zh: matches.map(m => TYPES[m.type]?.label?.zh || '').join('・'),
        my: matches.map(m => TYPES[m.type]?.label?.my || '').join(' / '),
        vi: matches.map(m => TYPES[m.type]?.label?.vi || '').join(' / ')
    };

    return {
        id: 'mixed',
        label: combinedLabel,
        color: 'bg-slate-500', 
        text: 'text-slate-600',
        border: 'border-slate-500',
        icon: 'fa-layer-group',
        pdf: null 
    };
}



        // 汎用スケジュール取得（指定日からN日分）
        function getScheduleRange(startDate, days) {
            const arr = [];
            for(let i=0; i<days; i++) {
                const d = new Date(startDate);
                d.setDate(startDate.getDate() + i);
                arr.push({ date: d, type: getGarbage(d, state.region) });
            }
            return arr;
        }

       function moveCalendar(amount) {
            const d = new Date(state.viewDate);
            if (state.viewMode === 'week') {

            } else {
                // ▼ 修正: 月末ジャンプバグ回避のため、一時的に1日にセットしてから月を動かす
                d.setDate(1); 
                d.setMonth(d.getMonth() + amount);
            }
            state.viewDate = d;
            renderHome();
        }

        // ▼ 音声検索ロジック (既存のまま) ▼
        function startVoiceSearch() {
            if (!SpeechRecognition) return;
            
            const recognition = new SpeechRecognition();
            recognition.lang = state.lang === 'en' ? 'en-US' : 'ja-JP';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            const btn = document.getElementById('btn-mic');
            const originalIcon = btn.innerHTML;
            
            // 録音中演出
            btn.innerHTML = '<i class="fa-solid fa-circle text-red-500 animate-pulse"></i>';
            btn.classList.add('ring-2', 'ring-red-200');

            recognition.start();

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const input = document.getElementById('sInput');
                input.value = transcript;
                doSearch(transcript);
                showToast(`音声入力: "${transcript}"`);
            };

            recognition.onend = () => {
                btn.innerHTML = originalIcon;
                btn.classList.remove('ring-2', 'ring-red-200');
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                btn.innerHTML = originalIcon;
                showToast("音声認識できませんでした");
            };
        }

        function doSearch(q) {
            const el = document.getElementById('sResults');
            if(!q) { renderSearch(); return; } 
            
            const term = q.toLowerCase();
            const hits = TRASH_DB.filter(item => {
                const searchStr = (item.n + item.y + (item[state.lang] || '')).toLowerCase();
                return searchStr.includes(term);
            }).slice(0, 50);

            if(hits.length === 0) {
                el.innerHTML = `<div class="text-center py-12 text-gray-400 font-bold">${t('no_res')}</div>`;
                return;
            }

            el.innerHTML = `
                <div class="space-y-3 max-w-3xl mx-auto">
                    ${hits.map(h => {
                        const T = TYPES[h.k];
                        const dispName = h[state.lang] || h.n;
                        return `
                        <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border-l-4 ${T.border} flex flex-col">
                            <div class="flex justify-between items-start mb-1">
                                <div>
                                    <span class="font-bold text-lg text-gray-800 dark:text-gray-100">${dispName}</span>
                                    <div class="text-[10px] text-gray-400">${h.n !== dispName ? h.n : h.y}</div>
                                </div>
                                <span class="text-[10px] px-2 py-1 rounded-full ${T.color} text-white font-bold tracking-wide text-center min-w-[80px]">${T.label[state.lang]||T.label.ja}</span>
                            </div>
                            ${h.note ? `<div class="mt-2 pt-2 border-t border-gray-100 dark:border-gray-700 text-xs text-gray-500 dark:text-gray-400 font-bold"><i class="fa-solid fa-circle-info mr-1"></i> ${h.note}</div>` : ''}
                        </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

// ▼ 追加: アイコンタップ時にチップを表示する関数 ▼
      // ▼ 修正版: showIconTip (テキストを直接受け取るように変更) ▼
let tipTimer = null;
function showIconTip(e, labelText) {
    e.stopPropagation(); 
    if (!labelText) return;

    const tip = document.getElementById('icon-tip');
    const rect = e.currentTarget.getBoundingClientRect(); 

    // チップに文字セット (ID検索ではなく、渡された文字をそのまま使う)
    tip.innerText = labelText;
    
    // 位置合わせ（アイコンの真上・中央）
    tip.style.left = (rect.left + rect.width / 2) + 'px';
    tip.style.top = rect.top + 'px';

    // 表示アニメーション
    tip.classList.remove('hidden');
    requestAnimationFrame(() => {
        tip.classList.remove('opacity-0', '-translate-y-2');
        tip.classList.add('opacity-100', '-translate-y-full'); 
    });

    // 以前のタイマーがあれば消す
    if (tipTimer) clearTimeout(tipTimer);

    // 2秒後に消す
    tipTimer = setTimeout(() => {
        tip.classList.remove('opacity-100', '-translate-y-full');
        tip.classList.add('opacity-0', '-translate-y-2');
        setTimeout(() => tip.classList.add('hidden'), 300);
    }, 2000);
}

// --- NEWS SYSTEM (Gomi-News) ---
async function loadNews() {
    const container = document.getElementById('news-feed');
    if(!container) return;

    // 1. まずキャッシュを表示 (オフライン対策)
    const cached = localStorage.getItem('news_cache');
    if (cached) renderNewsList(JSON.parse(cached), container);

    // 2. 最新データを取得
    try {
        // ?t=... でキャッシュ回避
        const res = await fetch(NEWS_API + '?t=' + new Date().getTime());
        const data = await res.json();
        
        // 3. データが「配列」なら処理する（0件でもOKにする）
        if (Array.isArray(data)) {
            // キャッシュを最新状態（0件なら空）に上書き
            localStorage.setItem('news_cache', JSON.stringify(data));

            if (data.length === 0) {
                // ▼ データが0件なら、画面のお知らせも消す
                container.innerHTML = ''; 
            } else {
                // ▼ データがあるなら描画する
                renderNewsList(data, container);
            }
        }
    } catch (e) {
        // オフライン時はキャッシュのみで静かに耐える
        if (!cached) container.innerHTML = `<div class="text-center text-xs text-gray-400 py-4">お知らせの読み込みに失敗しました</div>`;
    }
}

function renderNewsList(data, container) {
    if(!data || !data.length) {
        container.innerHTML = '<div class="text-center text-gray-500 py-8">現在お知らせはありません</div>';
        return;
    }
    
    // 最新10件を表示（5件だと少ないため少し増やしました。全て表示したい場合は slice を消してください）
    const html = data.slice(0, 10).map((item, index) => {
        const safeCategory = escapeHtml(item.category || "");
        const safeTitle = escapeHtml(item.title || "");
        const safeBody = escapeHtml(item.body || "");
        const safeDate = escapeHtml(item.date || "");

        // カテゴリ別色分け
        let badgeColor = "bg-gray-100 text-gray-600";
        if(safeCategory.includes("重要")) badgeColor = "bg-red-100 text-red-600";
        if(safeCategory.includes("イベント")) badgeColor = "bg-green-100 text-green-600";
        if(safeCategory.includes("お知らせ")) badgeColor = "bg-blue-100 text-blue-600";

        return `
        <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 transition-all mb-4">
            <div class="flex items-center justify-between mb-3">
                <span class="text-[10px] font-bold px-2.5 py-1 rounded-full ${badgeColor}">${safeCategory}</span>
                <span class="text-xs text-gray-400 font-mono">${safeDate}</span>
            </div>
            
            <h4 class="font-bold text-base text-gray-900 dark:text-white mb-3 leading-tight">
                ${safeTitle}
            </h4>
            
            ${safeBody ? `
            <div class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed whitespace-pre-wrap pt-3 border-t border-gray-50 dark:border-gray-700">
                ${safeBody}
            </div>
            ` : ''}
        </div>
        `;
    }).join('');

    container.innerHTML = `<div class="pb-8">${html}</div>`;
}

// 1. アプリ起動時に裏で未読チェックを行う関数
async function checkUnreadNews() {
    try {
        // バックグラウンドで最新データをこっそり取得
        const res = await fetch(NEWS_API + '?check=unread&t=' + new Date().getTime());
        const data = await res.json();
        
        if (Array.isArray(data) && data.length > 0) {
            // 一番新しいお知らせの日付 (例: "2024.05.12")
            const latestNewsDate = data[0].date; 
            // 端末に記録されている「最後に見た日付」
            const lastReadDate = localStorage.getItem('last_read_news_date');

            // 「最後に見た日付」がない（初回）、または最新のお知らせの方が新しい場合
            if (!lastReadDate || latestNewsDate > lastReadDate) {
                // バッジを表示する
                const badge = document.getElementById('news-badge');
                if (badge) badge.classList.remove('hidden');
            }
        }
    } catch (e) {
        console.log("未読チェック失敗 (オフライン等):", e);
        // バックグラウンド処理なので、エラー時は何もしない（静かに耐える）
    }
}

// 2. お知らせを「既読」にする関数
function markNewsAsRead(data) {
    if (Array.isArray(data) && data.length > 0) {
        const latestNewsDate = data[0].date;
        // 最新の日付を「最後に見た日付」として端末に保存
        localStorage.setItem('last_read_news_date', latestNewsDate);
        
        // バッジを隠す
        const badge = document.getElementById('news-badge');
        if (badge) badge.classList.add('hidden');
    }
}

// 3. 既存の loadNews() を少し修正して、既読処理を組み込む
async function loadNews() {
    const container = document.getElementById('news-feed');
    if(!container) return;

    // キャッシュ表示 (省略せずに既存のコードを残します)
    const cached = localStorage.getItem('news_cache');
    if (cached) renderNewsList(JSON.parse(cached), container);

    try {
        const res = await fetch(NEWS_API + '?t=' + new Date().getTime());
        const data = await res.json();
        
        if (Array.isArray(data)) {
            localStorage.setItem('news_cache', JSON.stringify(data));

            if (data.length === 0) {
                container.innerHTML = ''; 
            } else {
                // 描画処理 (前回の修正版 renderNewsList を使用)
                renderNewsList(data, container);
                
                // ★追加: 画面に描画した＝お知らせを見たので「既読」にする！

        if (!cached) container.innerHTML = `<div class="text-center text-xs text-gray-400 py-4">お知らせの読み込みに失敗しました</div>`;

}

// 五島列島バリア（ジオフェンス定義）

    N: 33.35, // 宇久島以北
    S: 32.50, // 黄島以南

// ▼ 新規追加: セキュリティのための文字列エスケープ関数 (XSS対策) ▼
function escapeHtml(str) {
    if (typeof str !== 'string') return '';
    return str.replace(/[&'`"<>]/g, function(match) {
        return {
            '&': '&amp;',
            "'": '&#x27;',
            '`': '&#x60;',
            '"': '&quot;',
            '<': '&lt;',
            '>': '&gt;'
        }[match];
    });
}

// 2. 位置情報チェック（屋内対策版）
function verifyLocation() {
    if (!navigator.geolocation) {
        // GPS非対応端末の場合は、自己申告に回す（救済措置）
        askSelfDeclaration("端末が位置情報に対応していません。");
        return;
    }

    showToast("位置情報を確認中...");

    navigator.geolocation.getCurrentPosition(
        // Success: 位置取得成功
        async (pos) => {
            const { latitude: lat, longitude: lon } = pos.coords;
            
            // バリア判定
            const isInside = (lat <= GOTO_BARRIER.N && lat >= GOTO_BARRIER.S && 
                              lon <= GOTO_BARRIER.E && lon >= GOTO_BARRIER.W);
            
            if (!isInside) {
                // バリア発動（エリア外）
                showModal("利用できません", 
                    `<div class="text-center text-red-500 font-bold">
                        <i class="fa-solid fa-ban text-4xl mb-2"></i><br>
                        五島市外と判定されました。<br>
                        <span class="text-xs text-gray-500">現在地: ${lat.toFixed(3)}, ${lon.toFixed(3)}</span>
                     </div>`, 
                    `<button onclick="closeModal()" class="w-full bg-gray-200 py-2 rounded font-bold">閉じる</button>`
                );
                return;
            }

            // エリア内ならOK → 次のステップ（GAS通信）へ
            checkReceptionStatus();
        },
        // Error: 取得失敗（屋内でタイムアウト等）
        (err) => {
            console.error(err);
            // 【重要】エラーだけで終わらせず、自己申告モーダルを出す
            askSelfDeclaration("現在地を取得できませんでした。<br>(屋内にいる場合など)");
        },
        // Options: 屋内最適化設定
        { 
            enableHighAccuracy: false, // ★重要: GPS衛星よりWi-Fi/基地局を優先（屋内対策）
            timeout: 10000,            // 10秒待つ
            maximumAge: 60000          // 過去1分以内のキャッシュがあればそれを使う
        } 
    );
}

            <button onclick="closeModal(); checkReceptionStatus();" class="bg-brand text-white py-2 rounded font-bold text-xs shadow-lg">はい（五島市内です）</button>
         </div>`
    );
}

async function checkReceptionStatus() {
    showToast("受付状態を確認中...");
    try {
        const res = await fetch(CAM_API); // GAS doGet
        const data = await res.json();

        if (data.accepting) {
            // 受付ON -> カメラ起動
            launchCamera();
        } else {
            // 受付OFF
            showModal("受付時間外", 
                `<div class="text-center">
                    <p class="text-gray-800 dark:text-white font-bold mb-2">現在は受付していません</p>
                    <p class="text-xs text-gray-500">職員の指示があるまでお待ちください。</p>
                 </div>`, 
                `<button onclick="closeModal()" class="w-full bg-gray-200 py-2 rounded font-bold">閉じる</button>`

// 起動時にアイコンの点滅を制御する関数
async function syncIndicator() {
    const dot = document.getElementById('cam-status-dot');
    if (!dot) return;

    try {
        // GASにこっそり問い合わせ（キャッシュ回避付き）
        const res = await fetch(CAM_API + '?check=init&t=' + new Date().getTime());
        const data = await res.json();

        if (data.accepting) {
            // ONなら点滅を表示
            dot.classList.remove('hidden');
        } else {
            // OFFなら隠す（念のため）
            dot.classList.add('hidden');
        }
    } catch (e) {
        // エラー時は静かに隠しておく
        dot.classList.add('hidden');
    }
}

function launchCamera() {
    // 隠しinputを作成してクリック
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment'; // 外カメラ指定
    
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        showToast("画像を送信準備中...");
        
        // 画像圧縮処理 (ここでEXIFも自動的に削除されます)
        const compressedBase64 = await compressImage(file);
        
        // 送信
        sendImageToGas(compressedBase64);
    };
    
    input.click();
}

function compressImage(file) {
    return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();
        
        reader.onload = (e) => {
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // リサイズ (長辺800px)
                const MAX_SIZE = 800;
                let w = img.width;
                let h = img.height;
                
                if (w > h) {
                    if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; }
                } else {
                    if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
                }
                
                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                
                // JPEG圧縮 (品質0.6)
                resolve(canvas.toDataURL('image/jpeg', 0.6));
            };
        };
        reader.readAsDataURL(file);
    });
}

// ▼ 写真送信関係の機能 (セキュリティ強化版)
async function sendImageToGas(base64) {
    // 【新規追加】二重送信防止：既に送信中なら何もしない
    if (isSendingImage) return;
    isSendingImage = true;

    showToast("送信中...画面を閉じずにお待ちください");
    try {
        const res = await fetch(CAM_API, {
            method: 'POST',
            body: JSON.stringify({ image: base64 })
        });
        
        const data = await res.json();

        if (data.success) {
            // ① 成功した場合 (A1がON)
            showModal("送信完了", 
                `<div class="text-center text-green-600 font-bold py-4">
                    <i class="fa-solid fa-check-circle text-4xl mb-2"></i><br>画像を送りました
                 </div>`,
                `<button onclick="closeModal()" class="w-full bg-brand text-white py-2 rounded font-bold">OK</button>`
            );
        } else {
            // ② 拒否された場合 (A1がOFF)
            // 【新規追加】XSS対策：外部から受け取ったエラーメッセージを無害化
            const safeErrorMsg = escapeHtml(data.error);

            showModal("送信できません", 
                `<div class="text-center text-red-500 font-bold py-4">
                    <i class="fa-solid fa-ban text-4xl mb-2"></i><br>
                    受け付けられませんでした
                 </div>
                 <div class="bg-gray-100 dark:bg-gray-700 p-3 rounded-lg text-xs text-gray-600 dark:text-gray-300 text-center">
                    理由: ${safeErrorMsg}
                 </div>`,
                `<button onclick="closeModal()" class="w-full bg-gray-200 dark:bg-gray-600 py-2 rounded font-bold">閉じる</button>`
            );
        }

    } catch (e) {
        // ③ 通信エラー (ネットが切れているなど)
        showToast("送信に失敗しました (通信エラー)");
        console.error(e);
    } finally {
        // 【新規追加】通信が終了したら（成功でも失敗でも）フラグをリセットして次の送信を許可する
        isSendingImage = false;
    }
}


// --- CALENDAR EXPORT LOGIC (iCal) - RFC 5545 Compliant & Undo Support ---
        
        // 日付文字列生成ヘルパー (ローカル時間基準 YYYYMMDD)
        const toIcalDate = (date) => {
            const y = date.getFullYear();
            const m = ('0' + (date.getMonth() + 1)).slice(-2);
            const d = ('0' + date.getDate()).slice(-2);
            return `${y}${m}${d}`;
        };

        function exportCalendar() {
            if (!state.region) return showToast("地域設定が必要です");

            const n18 = document.getElementById('cal-notify-18')?.checked;
            const n0700 = document.getElementById('cal-notify-0700')?.checked;
            const n0730 = document.getElementById('cal-notify-0730')?.checked;

            let events = [];
            const startDate = new Date();
            const endDate = new Date();
            endDate.setFullYear(startDate.getFullYear() + 1); 

            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const type = getGarbage(d, state.region);
                if (type.id === 'none') continue;

                const dateStrStart = toIcalDate(d);
                const nextDay = new Date(d);
                nextDay.setDate(d.getDate() + 1);
                const dateStrEnd = toIcalDate(nextDay);
                
                const label = type.label[state.lang] || type.label.ja;
                const uid = `${dateStrStart}-${type.id}@goto-gomi-navi`;

                let valarms = '';
                if (n18) valarms += `BEGIN:VALARM\nACTION:DISPLAY\nDESCRIPTION:Reminder\nTRIGGER:-PT6H\nEND:VALARM\n`;
                if (n0700) valarms += `BEGIN:VALARM\nACTION:DISPLAY\nDESCRIPTION:Reminder\nTRIGGER:PT7H\nEND:VALARM\n`;
                if (n0730) valarms += `BEGIN:VALARM\nACTION:DISPLAY\nDESCRIPTION:Reminder\nTRIGGER:PT7H30M\nEND:VALARM\n`;

                events.push(
`BEGIN:VEVENT
UID:${uid}
DTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z
DTSTART;VALUE=DATE:${dateStrStart}
DTEND;VALUE=DATE:${dateStrEnd}
SUMMARY:🗑️ ${label} (五島市)
DESCRIPTION:五島市ごみ分別ナビからの登録
TRANSP:TRANSPARENT
${valarms}END:VEVENT`

            downloadIcs(events.join('\n'), 'goto_garbage_schedule.ics', t('cal_done_msg'));
        }

// ----------------------------------------------------
        // 🌤️ Sky-Link: Weather Integration (Open-Meteo)
        // ----------------------------------------------------
        
        // 五島市（福江）の座標
        const GOTO_COORDS = { lat: 32.696, long: 128.841 };

        // 天気コード変換 (WMO Code -> Icon/Label)
        function getWeatherInfo(code) {
            // 0:快晴, 1-3:晴/曇, 45-48:霧, 51-67:雨, 71-77:雪, 80-82:夕立, 95-99:雷雨
            if (code === 0) return { icon: 'fa-sun', label: '快晴', color: 'text-orange-500' };
            if (code <= 3) return { icon: 'fa-cloud-sun', label: '晴れ/曇り', color: 'text-orange-400' };
            if (code <= 48) return { icon: 'fa-smog', label: '霧', color: 'text-gray-400' };
            if (code <= 67) return { icon: 'fa-umbrella', label: '雨', color: 'text-blue-500' };
            if (code <= 77) return { icon: 'fa-snowflake', label: '雪', color: 'text-cyan-400' };
            if (code <= 82) return { icon: 'fa-cloud-showers-heavy', label: '強い雨', color: 'text-blue-600' };
            return { icon: 'fa-bolt', label: '雷雨', color: 'text-purple-500' };
        }

        // 天気データ取得とキャッシュ管理
        async function fetchWeather() {
            const CACHE_KEY = 'goto_weather_cache_v1';
            const CACHE_DURATION = 60 * 60 * 1000; // 1時間

            // 1. キャッシュチェック
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                const data = JSON.parse(cached);
                if (new Date().getTime() - data.timestamp < CACHE_DURATION) {
                    return data.forecast;
                }
            }

            // 2. API取得 (五島市福江)
            // daily: 天気コード, 最高/最低気温, 降水確率, 最大風速
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${GOTO_COORDS.lat}&longitude=${GOTO_COORDS.long}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=Asia%2FTokyo&forecast_days=3`;

            try {
                const res = await fetch(url);
                const json = await res.json();
                
                // 扱いやすい形に整形
                const forecast = json.daily.time.map((t, i) => ({
                    date: t,
                    code: json.daily.weathercode[i],
                    tempMax: Math.round(json.daily.temperature_2m_max[i]),
                    tempMin: Math.round(json.daily.temperature_2m_min[i]),
                    rainProb: json.daily.precipitation_probability_max[i],
                    windSpeed: json.daily.windspeed_10m_max[i] // km/h
                }));

                // 3. 保存
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    timestamp: new Date().getTime(),
                    forecast: forecast
                }));

                return forecast;

            } catch (e) {
                console.error("Weather fetch failed", e);
                return null; // エラー時はnullを返してUI側で非表示にする
            }
        }

        // ごみ出しアドバイス生成
        function getWeatherAdvice(dayData) {
            if (!dayData) return null;
            
            // 優先度1: 強風 (五島は風が強い)
            // ボックスがあっても風で煽られる危険はあるので注意喚起のみ残します
            if (dayData.windSpeed >= 20) {
                return { text: "強風注意", icon: "fa-wind", alert: true };
            }
            // 優先度2: 雨 (40%以上または雨コード)
            const isRainCode = (dayData.code >= 51 && dayData.code <= 67) || (dayData.code >= 80);
            if (dayData.rainProb >= 40 || isRainCode) {
                // 【修正】ネット不要のため、足元の安全への配慮に変更
                return { text: "雨: 足元注意", icon: "fa-umbrella", alert: false };
            }
            
            // 何もなければ気温表示
            return { text: `${dayData.tempMin}°C / ${dayData.tempMax}°C`, icon: "fa-temperature-half", alert: false };
        }
